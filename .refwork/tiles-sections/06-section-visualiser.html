<section id="visualize" data-screen-label="Visualiser" style="padding:100px 40px; background:var(--surface); border-top:1px solid var(--line); border-bottom:1px solid var(--line);">
    <div style="max-width:1240px; margin:0 auto; display:grid; grid-template-columns:1fr 340px; gap:44px; align-items:center;">
      <div>
        <div style="position:relative; border-radius:20px; overflow:hidden; box-shadow:0 30px 70px rgba(0,0,0,.18); background:#d9d2c6; aspect-ratio:16/11; perspective:1400px;">
          <!-- room back wall / placeholder -->
          <div style="position:absolute; inset:0; background:linear-gradient(180deg,#e9e3d8 0%,#ded6c8 46%,#d3cabb 46%);"></div>
          <div style="position:absolute; left:0; right:0; top:0; height:46%; overflow:hidden;">
            <x-import component-from-global-scope="image-slot" from="d0c17fca-4e5d-40a1-a11c-ceedd3e03a94#/image-slot.js" id="viz-room" shape="rect" placeholder="Drop a straight-on room photo" style="position:absolute; inset:0; width:100%; height:100%; display:block;" hint-size="100%,100%"></x-import>
          </div>
          <!-- perspective floor -->
          <div style="position:absolute; left:-10%; right:-10%; bottom:-2%; top:44%; transform-origin:center bottom; transform:rotateX(58deg); ">
            <div data-floor="" style="position:absolute; inset:0; background:repeating-linear-gradient(91deg, rgba(0,0,0,.14) 0 2px, transparent 2px 130px), repeating-linear-gradient(1deg, #C8894B 0 44px, #b97e42 44px 46px); background-size:auto, auto; transition:opacity .5s ease, filter .5s ease; box-shadow:inset 0 0 120px rgba(0,0,0,.25);"></div>
          </div>
          <div style="position:absolute; inset:0; background:radial-gradient(80% 60% at 50% 100%, rgba(0,0,0,.14), transparent 70%); pointer-events:none;"></div>
          <div data-floorname="" style="position:absolute; left:16px; bottom:14px; background:rgba(0,0,0,.55); color:#fff; font-weight:700; font-size:13px; padding:8px 14px; border-radius:100px; backdrop-filter:blur(4px);">European Oak</div>
        </div>
      </div>
      <div>
        <div data-reveal="" style="font-size:12.5px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:var(--sea);">Live visualiser</div>
        <h2 data-reveal="" style="font-family:'Archivo'; font-weight:800; font-size:clamp(28px,3.4vw,42px); letter-spacing:-.02em; margin:12px 0 14px;">See it on your floor</h2>
        <p data-reveal="" style="color:var(--muted); font-size:15px; line-height:1.6; margin:0 0 22px;">Tap a finish to lay it across the room instantly. In the full build this swaps onto <em>your</em> uploaded photo with lighting matched.</p>
        <div style="display:grid; grid-template-columns:repeat(2,1fr); gap:12px;">
          <sc-for list="{{ swatches }}" as="sw" hint-placeholder-count="6">
            <button data-swatch="" data-name="{{ sw.name }}" onclick="{{ pickFloor }}" style="display:flex; align-items:center; gap:11px; padding:9px; border-radius:13px; border:1.5px solid var(--line); background:var(--bg); cursor:pointer; text-align:left; transition:border-color .2s, transform .2s;">
              <span data-swatchchip="" style="width:40px; height:40px; border-radius:9px; background:{{ sw.swatch }}; box-shadow:inset 0 0 0 1px rgba(0,0,0,.1); flex-shrink:0;"></span>
              <span style="font-weight:700; font-size:13.5px; color:var(--ink); line-height:1.2;">{{ sw.name }}</span>
            </button>
          </sc-for>
        </div>
      </div>
    </div>
  </section>
