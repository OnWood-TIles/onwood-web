<section style="padding:110px 40px; max-width:1240px; margin:0 auto;">
    <div style="text-align:center; margin-bottom:44px;">
      <div data-reveal="" style="font-size:12.5px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:var(--accent2);">From Sunshine Coast homes</div>
      <h2 data-reveal="" style="font-family:'Archivo'; font-weight:800; font-size:clamp(30px,4vw,52px); letter-spacing:-.02em; margin:12px 0 0;">People stop and look down.</h2>
    </div>
    <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:22px;">
      <sc-for list="{{ quotes }}" as="q" hint-placeholder-count="3">
        <figure data-reveal="" style="margin:0; padding:28px; border-radius:18px; background:var(--surface); border:1px solid var(--line);">
          <div style="color:var(--accent); font-size:22px; letter-spacing:2px;">★★★★★</div>
          <blockquote style="font-family:'Newsreader'; font-style:italic; font-size:19px; line-height:1.5; margin:14px 0 18px; color:var(--ink);">"{{ q.text }}"</blockquote>
          <figcaption style="font-size:13.5px; color:var(--muted);"><strong style="color:var(--ink);">{{ q.name }}</strong> · {{ q.place }}</figcaption>
        </figure>
      </sc-for>
    </div>
  </section>
