<section id="contact" data-screen-label="Contact" style="padding:100px 40px; background:var(--surface); border-top:1px solid var(--line);">
    <div style="max-width:1080px; margin:0 auto; display:grid; grid-template-columns:1fr 1fr; gap:56px; align-items:center;">
      <div>
        <h2 data-reveal="" style="font-family:'Archivo'; font-weight:800; font-size:clamp(32px,4.4vw,56px); letter-spacing:-.02em; margin:0 0 16px; line-height:1.02;">Let's lay something beautiful.</h2>
        <p data-reveal="" style="color:var(--muted); font-size:16px; line-height:1.6; margin:0 0 26px;">Book a free measure &amp; quote, or drop by the showroom for a coffee and a fistful of samples.</p>
        <div data-reveal="" style="display:flex; flex-direction:column; gap:14px;">
          <div style="display:flex; align-items:center; gap:12px; font-size:15px;"><span style="width:38px; height:38px; border-radius:10px; background:var(--accent); display:grid; place-items:center; color:#1a1411; font-weight:800;">◎</span> Showroom · Maroochydore, Sunshine Coast QLD</div>
          <div style="display:flex; align-items:center; gap:12px; font-size:15px;"><span style="width:38px; height:38px; border-radius:10px; background:var(--accent2); display:grid; place-items:center; color:#fff; font-weight:800;">✆</span> (07) 5555 0192 · Mon–Sat</div>
          <div style="display:flex; align-items:center; gap:12px; font-size:15px;"><span style="width:38px; height:38px; border-radius:10px; background:var(--ink); display:grid; place-items:center; color:var(--surface); font-weight:800;">@</span> hello@onwood.com.au</div>
        </div>
      </div>
      <form data-form="" onsubmit="{{ onSubmit }}" style="background:var(--bg); border:1px solid var(--line); border-radius:20px; padding:26px; display:flex; flex-direction:column; gap:14px;">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px;">
          <input required="" placeholder="Name" style="padding:13px 15px; border-radius:11px; border:1.5px solid var(--line); background:var(--surface); font-family:inherit; font-size:14px; color:var(--ink); outline:none;">
          <input required="" placeholder="Suburb" style="padding:13px 15px; border-radius:11px; border:1.5px solid var(--line); background:var(--surface); font-family:inherit; font-size:14px; color:var(--ink); outline:none;">
        </div>
        <input required="" type="email" placeholder="Email" style="padding:13px 15px; border-radius:11px; border:1.5px solid var(--line); background:var(--surface); font-family:inherit; font-size:14px; color:var(--ink); outline:none;">
        <select style="padding:13px 15px; border-radius:11px; border:1.5px solid var(--line); background:var(--surface); font-family:inherit; font-size:14px; color:var(--ink); outline:none;">
          <option>I'm interested in… timber-look tiles</option>
          <option>Natural stone</option>
          <option>Engineered timber</option>
          <option>Whole-home flooring</option>
          <option>Commercial fit-out</option>
        </select>
        <textarea rows="3" placeholder="Tell us about the space" style="padding:13px 15px; border-radius:11px; border:1.5px solid var(--line); background:var(--surface); font-family:inherit; font-size:14px; color:var(--ink); outline:none; resize:vertical;"></textarea>
        <button data-magnetic="" type="submit" style="padding:15px; border-radius:100px; border:none; background:var(--ink); color:var(--surface); font-weight:800; font-size:15px; cursor:pointer; font-family:inherit;">Book my free measure &amp; quote</button>
      </form>
    </div>
  </section>
