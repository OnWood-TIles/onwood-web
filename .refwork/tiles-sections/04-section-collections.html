<section id="collections" data-screen-label="Collections" style="padding:40px 40px 110px; max-width:1240px; margin:0 auto;">
    <div style="display:flex; align-items:flex-end; justify-content:space-between; gap:20px; flex-wrap:wrap; margin-bottom:40px;">
      <div>
        <div data-reveal="" style="font-size:12.5px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:var(--accent2);">Collections</div>
        <h2 data-reveal="" style="font-family:'Archivo'; font-weight:800; font-size:clamp(30px,4vw,52px); letter-spacing:-.02em; margin:12px 0 0;">Six ranges. One obsession with grain.</h2>
      </div>
      <a href="#contact" data-nav="" data-target="#contact" onclick="{{ navTo }}" data-reveal="" style="text-decoration:none; color:var(--ink); font-weight:700; font-size:14px; border-bottom:2px solid var(--accent); padding-bottom:3px;">Request full sample box →</a>
    </div>
    <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:22px;">
      <sc-for list="{{ collections }}" as="col" hint-placeholder-count="6">
        <article data-reveal="" data-tilt-card="" style="position:relative; border-radius:20px; overflow:hidden; background:var(--surface); border:1px solid var(--line); transition:transform .16s ease-out, box-shadow .3s; transform-style:preserve-3d; cursor:pointer;">
          <div style="aspect-ratio:4/3.4; background:{{ col.swatch }}; position:relative; border-radius:130px 130px 0 0; margin:10px 10px 0; overflow:hidden;">
            <div style="position:absolute; inset:0; background:radial-gradient(80% 60% at 50% 0%, rgba(255,255,255,.18), transparent 70%);"></div>
            <span style="position:absolute; top:16px; left:50%; transform:translateX(-50%); white-space:nowrap; font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:#fff; background:rgba(0,0,0,.38); padding:5px 12px; border-radius:100px; backdrop-filter:blur(4px);">{{ col.tag }}</span>
          </div>
          <div style="padding:18px 18px 20px;">
            <div style="display:flex; align-items:center; justify-content:space-between; gap:10px;">
              <h3 style="font-family:'Archivo'; font-weight:800; font-size:20px; margin:0;">{{ col.name }}</h3>
              <span style="font-size:13px; color:var(--muted); white-space:nowrap;">{{ col.price }}</span>
            </div>
            <p style="color:var(--muted); font-size:14px; line-height:1.55; margin:8px 0 0;">{{ col.desc }}</p>
          </div>
        </article>
      </sc-for>
    </div>
  </section>
