<section style="padding:110px 40px; max-width:1240px; margin:0 auto;">
    <div style="text-align:center; margin-bottom:48px;">
      <div data-reveal="" style="font-size:12.5px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:var(--accent2);">Every surface, alive to the touch</div>
      <h2 data-reveal="" style="font-family:'Archivo'; font-weight:800; font-size:clamp(30px,4vw,52px); letter-spacing:-.02em; margin:12px 0 0;">Move your cursor across the floor</h2>
    </div>
    <div data-grid="" style="display:grid; grid-template-columns:repeat(16,1fr); gap:10px; perspective:1000px;">
      <sc-for list="{{ cells }}" as="c" hint-placeholder-count="96">
        <div data-cell="" style="aspect-ratio:1; border-radius:7px; background:color-mix(in oklab, var(--accent) 14%, transparent); border:1px solid color-mix(in oklab, var(--ink) 8%, transparent); transition:transform .34s cubic-bezier(.2,.8,.2,1), background .34s, box-shadow .34s; will-change:transform;"></div>
      </sc-for>
    </div>
  </section>
